<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPF - Guia Pocket Flex</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #161616;
            --accent: #00ffcc; /* Verde Água Técnico */
            --text: #e0e0e0;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
        }

        .display-475 {
            background: linear-gradient(135deg, #003366 0%, #001a33 100%);
            border: 4px solid #4a4a4a;
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            font-family: monospace;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .tag-pn { background: #ffcc00; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
        }

        /* Estilo da Biblioteca Dinâmica */
        #biblioteca-backups {
            margin-top: 30px;
            border-top: 2px dashed var(--border);
            padding-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>GPF v2.0</h1>
    <small>Guia Pocket Flex - WS Controles</small>
</header>

<div id="simulador-475" class="display-475">
    <div style="display:flex; justify-content: space-between; font-size: 10px;">
        <span>HART COMMUNICATOR</span>
        <span style="color:red">❤️</span>
    </div>
    <div style="text-align:center; border-bottom:1px solid #0055aa; margin: 10px 0;">
        <strong id="displayTag">GPF READY</strong>
    </div>
    <div id="displayContent">
        <div style="display:flex; justify-content:space-between"><span>1. PV</span><span id="pvVal">--</span></div>
        <div style="display:flex; justify-content:space-between"><span>2. LRV</span><span id="lrvVal">0.00</span></div>
        <div style="display:flex; justify-content:space-between"><span>3. URV</span><span id="urvVal">100.0</span></div>
    </div>
</div>

<div class="card" style="border-left: 5px solid #ff5500;">
    <h3>Secador de Esteira</h3>
    <p>Status: Operacional</p>
    <button onclick="prepararBackup('Secador Esteira', 'Parâmetros de Secagem OK')">SALVAR BACKUP SECADOR</button>
</div>

<div class="card" style="border-left: 5px solid var(--accent);">
    <h3>Woodward Peak 150</h3>
    <p>Controle de Turbina</p>
    <button onclick="prepararBackup('Peak 150', 'Overspeed: 110%, Rated: 3600rpm')">SALVAR BACKUP PEAK</button>
</div>

<div id="biblioteca-backups">
    <h2 style="color: var(--accent); font-size: 18px;">📦 MEUS BACKUPS (BIBLIOTECA)</h2>
    <div id="lista-backups-dinamica">
        <p id="msg-vazio">Nenhum dado armazenado na biblioteca...</p>
    </div>
</div>

<script>
    // 1. Banco de Dados Interno
    const DB = [
        { id: 'peak150', name: 'Woodward Peak 150', lrv: '0 rpm', urv: '4000 rpm' },
        { id: '3051s', name: 'Rosemount 3051S', lrv: '0 mmH2O', urv: '1000 mmH2O' }
    ];

    // 2. Função de Backup (Salva na Biblioteca)
    function prepararBackup(tag, info) {
        const data = new Date().toLocaleString();
        const bkp = { tag, info, data };

        let biblioteca = JSON.parse(localStorage.getItem('gpf_db')) || [];
        biblioteca.push(bkp);
        localStorage.setItem('gpf_db', JSON.stringify(biblioteca));

        renderizarBiblioteca();
        alert("Backup de " + tag + " salvo na biblioteca!");
    }

    // 3. Renderizar Biblioteca embaixo do Secador
    function renderizarBiblioteca() {
        const lista = document.getElementById('lista-backups-dinamica');
        const msg = document.getElementById('msg-vazio');
        const dados = JSON.parse(localStorage.getItem('gpf_db')) || [];

        if (dados.length > 0) {
            msg.style.display = 'none';
            lista.innerHTML = '';
            dados.forEach(item => {
                lista.innerHTML += `
                    <div class="card" style="background:#222; border: 1px dashed #444;">
                        <div style="display:flex; justify-content:space-between">
                            <strong style="color:var(--accent)">${item.tag}</strong>
                            <small>${item.data}</small>
                        </div>
                        <p style="font-size:12px; margin-top:5px;">${item.info}</p>
                    </div>
                `;
            });
        }
    }

    // Inicialização
    window.onload = renderizarBiblioteca;
</script>

</body>
</html>
